<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="icon.jpg">
  <title>nepetapip3 · bio</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <style>
    :root {
      /* Палитра Material Design 3 (Тёмно-серая монохромная схема) */
      --md-sys-color-background: #121212;
      --md-sys-color-on-background: #f2f2f2;
      --md-sys-color-surface: #1e1e1e;
      --md-sys-color-surface-variant: #333333;
      --md-sys-color-on-surface: #f2f2f2;
      --md-sys-color-on-surface-variant: #b3b3b3;
      --md-sys-color-primary: #ffffff;
      --md-sys-color-on-primary: #121212;
      --md-sys-color-outline: #555555;
      --md-ripple-color: rgba(255, 255, 255, 0.15);
      
      --md-elevation-1: 0px 1px 3px 1px rgba(0, 0, 0, 0.3), 0px 1px 2px 0px rgba(0, 0, 0, 0.5);
      --md-elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.3), 0px 1px 2px 0px rgba(0, 0, 0, 0.5);
    }

    html[data-theme="light"] {
      --md-sys-color-background: #f5f5f5;
      --md-sys-color-on-background: #121212;
      --md-sys-color-surface: #ffffff;
      --md-sys-color-surface-variant: #e0e0e0;
      --md-sys-color-on-surface: #121212;
      --md-sys-color-on-surface-variant: #666666;
      --md-sys-color-primary: #121212;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-outline: #cccccc;
      --md-ripple-color: rgba(0, 0, 0, 0.1);

      --md-elevation-1: 0px 1px 3px 1px rgba(0, 0, 0, 0.05), 0px 1px 2px 0px rgba(0, 0, 0, 0.1);
      --md-elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.05), 0px 1px 2px 0px rgba(0, 0, 0, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--md-sys-color-background);
      color: var(--md-sys-color-on-background);
      font-family: 'Google Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 88px 24px 48px;
      transition: background .3s ease, color .3s ease;
    }

    .app-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: var(--md-sys-color-surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      transition: background .3s ease;
    }
    html[data-theme="light"] .app-bar {
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .app-bar-title {
      font-family: 'Google Sans Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface);
      letter-spacing: .02em;
    }

    .controls-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn, .lang-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 100px;
      cursor: pointer;
      color: var(--md-sys-color-on-surface);
      transition: background .2s, border-color .2s;
    }

    .lang-btn {
      gap: 8px;
      padding: 0 16px;
      height: 40px;
      font-family: 'Google Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
    }

    .icon-btn:hover, .lang-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }
    html[data-theme="dark"] .icon-btn:hover, html[data-theme="dark"] .lang-btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Безопасная анимация через CSS-классы */
    .card {
      background: var(--md-sys-color-surface);
      border-radius: 28px;
      box-shadow: var(--md-elevation-1);
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      
      /* Исходное состояние: скрыта и смещена вниз */
      opacity: 0;
      transform: translateY(16px);
      transition: background .3s ease, box-shadow .3s ease, opacity .4s cubic-bezier(0.2, 0, 0, 1), transform .4s cubic-bezier(0.2, 0, 0, 1);
    }

    /* Класс для запуска анимации */
    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .avatar-link {
      display: inline-block;
      border-radius: 50%;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .avatar-link:hover {
      transform: scale(1.04);
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--md-sys-color-outline);
      display: block;
    }

    .nick {
      font-family: 'Google Sans Mono', monospace;
      font-size: 24px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface);
      letter-spacing: .02em;
    }

    .description {
      font-size: 15px;
      font-weight: 400;
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.6;
      margin-bottom: 36px;
      text-align: left;
    }

    .divider {
      height: 1px;
      background: var(--md-sys-color-surface-variant);
      margin: 0 -40px 32px;
      opacity: 0.3;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      width: 100%;
    }

    .md-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--md-sys-color-on-surface);
      font-family: 'Google Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: .01em;
      text-decoration: none;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 100px;
      padding: 0 20px;
      height: 48px;
      cursor: pointer;
      transition: background .25s ease, color .25s ease, border-color .25s ease, box-shadow .25s ease;
      justify-content: center;
    }
    
    .md-btn:hover {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border-color: transparent;
      box-shadow: var(--md-elevation-2);
    }

    .ripple-circle {
      position: absolute;
      border-radius: 50%;
      background: var(--md-ripple-color);
      transform: scale(0);
      animation: ripple .4s cubic-bezier(0.1, 0.8, 0.3, 1);
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    footer {
      margin-top: 48px;
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.6;
      letter-spacing: .04em;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 8px;
      transition: opacity .2s ease, background .2s ease, transform .1s ease;
      user-select: none;
    }
    footer:hover {
      opacity: 0.9;
      background: rgba(0, 0, 0, 0.03);
    }
    html[data-theme="dark"] footer:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    footer:active { transform: scale(0.97); }
    .footer-fade {
      opacity: 0;
      transform: translateY(-4px);
    }

    @media (max-width: 600px) {
      body { padding: 80px 16px 32px; }

      .card {
        padding: 36px 24px;
        border-radius: 24px;
      }

      .profile {
        flex-direction: column;
        gap: 12px;
      }

      .nick { text-align: center; }

      .divider { margin: 0 -24px 24px; }

      .btn-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .md-btn {
        height: 52px;
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="app-bar">
    <div style="display:flex; align-items:center; gap:12px">
      <span class="material-icons" style="color: var(--md-sys-color-on-surface)">person</span>
      <span class="app-bar-title">nepetapip3 · bio</span>
    </div>
    <div class="controls-group">
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Сменить тему">
        <span class="material-icons">dark_mode</span>
      </button>
      <button class="lang-btn" onclick="toggleLang()">
        <span class="material-icons">translate</span>
        <span id="lang-label">RU</span>
      </button>
    </div>
  </div>

  <div class="card" id="main-card">
    <div class="profile">
      <a href="easteregg.jpg" class="avatar-link">
        <img src="avatarka.jpg" class="avatar" alt="avatar">
      </a>
      <div class="nick">nepetapip3</div>
    </div>

    <p class="description" id="bio-desc">
      био уже не релевантно, я любитель, разрабатываю разные проекты для себя и все
    </p>

    <div class="divider"></div>

    <div class="btn-grid">
      <a class="md-btn" href="https://github.com/nepetapip3" target="_blank">
        <span class="material-icons" style="font-size:20px">code</span>
        <span>GitHub</span>
      </a>
      <a class="md-btn" href="https://t.me/nepetapip3" target="_blank">
        <span class="material-icons" style="font-size:20px">send</span>
        <span>Telegram</span>
      </a>
      <a class="md-btn" href="https://4pda.to/forum/index.php?showuser=12169012" target="_blank">
        <span class="material-icons" style="font-size:20px">forum</span>
        <span>4PDA</span>
      </a>
    </div>
  </div>

  <footer id="footer-text" onclick="changeFooterText()" title="Кликни, чтобы изменить фразу">nepetapip3 · bio</footer>

  <script>
    // Плавный въезд карточки сразу после загрузки DOM
    document.addEventListener("DOMContentLoaded", () => {
      requestAnimationFrame(() => {
        document.getElementById("main-card").classList.add("visible");
      });
    });

    document.querySelectorAll('.md-btn, .lang-btn, .icon-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const circle = document.createElement('span');
        const rect   = this.getBoundingClientRect();
        const size   = Math.max(rect.width, rect.height);
        
        circle.className = 'ripple-circle';
        circle.style.width = circle.style.height = `${size}px`;
        circle.style.left = `${e.clientX - rect.left - size/2}px`;
        circle.style.top = `${e.clientY - rect.top - size/2}px`;
        
        this.appendChild(circle);
        circle.addEventListener('animationend', () => circle.remove());
      });
    });

    const footerVariants = [
      "nepetapip3.lol?",
      "nepetacsv? who is this?",
      "nepetapip3",
      " sudo rm -rf --no-preserve-root /* ",
      "404 not found",
      "what is nekobrawl?",
      "i use cachyos btw :3",
      "does anyone actually read this?",
      "lol",
      "whoami"
    ];

    const footerEl = document.getElementById('footer-text');
    footerEl.textContent = footerVariants[Math.floor(Math.random() * footerVariants.length)];

    function changeFooterText() {
      footerEl.style.transition = 'opacity 0.15s ease, transform 0.15s ease';
      footerEl.classList.add('footer-fade');
      
      setTimeout(() => {
        let currentText = footerEl.textContent;
        let newText = currentText;
        while (newText === currentText) {
          newText = footerVariants[Math.floor(Math.random() * footerVariants.length)];
        }
        footerEl.textContent = newText;
        footerEl.classList.remove('footer-fade');
      }, 150);
    }

    function toggleTheme() {
      const html = document.documentElement;
      const themeBtnIcon = document.querySelector('#theme-btn .material-icons');
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      html.setAttribute('data-theme', newTheme);
      themeBtnIcon.textContent = newTheme === 'dark' ? 'dark_mode' : 'light_mode';
      localStorage.setItem('theme', newTheme);
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.querySelector('#theme-btn .material-icons').textContent = savedTheme === 'dark' ? 'dark_mode' : 'light_mode';

    const translations = {
      ru: {
        desc: "био уже не релевантно, я любитель, разрабатываю разные проекты для себя и все",
        label: "RU"
      },
      en: {
        desc: "bio is no longer relevant, I'm an amateur, I develop different projects for myself and that's all",
        label: "EN"
      }
    };

    let currentLang = 'ru';

    function toggleLang() {
      currentLang = currentLang === 'ru' ? 'en' : 'ru';
      document.getElementById('lang-label').textContent = translations[currentLang].label;
      document.getElementById('bio-desc').textContent = translations[currentLang].desc;
    }
  </script>
</body>
</html>
