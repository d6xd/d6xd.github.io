<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="ico.jpg">
  <title>shakal1zator</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <style>
    :root {
      /* Палитра Material Design 3 (Тёмно-серая монохромная схема) */
      --md-sys-color-background: #121212;
      --md-sys-color-on-background: #f2f2f2;
      --md-sys-color-surface: #1e1e1e;
      --md-sys-color-surface-variant: #333333;
      --md-sys-color-on-surface: #f2f2f2;
      --md-sys-color-on-surface-variant: #b3b3b3;
      --md-sys-color-primary: #ffffff;
      --md-sys-color-on-primary: #121212;
      --md-sys-color-outline: #555555;
      --md-ripple-color: rgba(255, 255, 255, 0.15);
      
      --md-elevation-1: 0px 1px 3px 1px rgba(0, 0, 0, 0.3), 0px 1px 2px 0px rgba(0, 0, 0, 0.5);
      --md-elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.3), 0px 1px 2px 0px rgba(0, 0, 0, 0.5);
    }

    html[data-theme="light"] {
      --md-sys-color-background: #f5f5f5;
      --md-sys-color-on-background: #121212;
      --md-sys-color-surface: #ffffff;
      --md-sys-color-surface-variant: #e0e0e0;
      --md-sys-color-on-surface: #121212;
      --md-sys-color-on-surface-variant: #666666;
      --md-sys-color-primary: #121212;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-outline: #cccccc;
      --md-ripple-color: rgba(0, 0, 0, 0.1);

      --md-elevation-1: 0px 1px 3px 1px rgba(0, 0, 0, 0.05), 0px 1px 2px 0px rgba(0, 0, 0, 0.1);
      --md-elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.05), 0px 1px 2px 0px rgba(0, 0, 0, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--md-sys-color-background);
      color: var(--md-sys-color-on-background);
      font-family: 'Google Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 88px 24px 48px;
      transition: background .3s ease, color .3s ease;
    }

    .app-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: var(--md-sys-color-surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      transition: background .3s ease;
    }
    html[data-theme="light"] .app-bar {
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .app-bar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-bar-title {
      font-family: 'Google Sans Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface);
      letter-spacing: .02em;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 100px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      color: var(--md-sys-color-on-surface);
      transition: background .2s, border-color .2s;
    }
    .icon-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }
    html[data-theme="dark"] .icon-btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Безопасная анимация */
    .card {
      background: var(--md-sys-color-surface);
      border-radius: 28px;
      box-shadow: var(--md-elevation-1);
      padding: 48px 40px;
      max-width: 640px;
      width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      transition: background .3s ease, box-shadow .3s ease, opacity .4s cubic-bezier(0.2, 0, 0, 1), transform .4s cubic-bezier(0.2, 0, 0, 1);
    }
    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .headline {
      font-size: 26px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--md-sys-color-on-surface);
      margin-bottom: 12px;
    }
    .subheadline {
      font-size: 15px;
      font-weight: 400;
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .divider {
      height: 1px;
      background: var(--md-sys-color-surface-variant);
      margin: 0 -40px 32px;
      opacity: 0.3;
    }

    .upload-zone {
      border: 2px dashed var(--md-sys-color-outline);
      border-radius: 16px;
      padding: 36px 20px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 24px;
      position: relative;
      background: rgba(0, 0, 0, 0.02);
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--md-sys-color-primary);
      background: rgba(0, 0, 0, 0.04);
    }
    html[data-theme="dark"] .upload-zone:hover, html[data-theme="dark"] .upload-zone.dragover {
      background: rgba(255, 255, 255, 0.04);
    }
    .upload-zone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon {
      font-size: 40px !important;
      color: var(--md-sys-color-on-surface);
      margin-bottom: 12px;
      display: block;
    }
    .upload-label {
      font-size: 14px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .upload-label span {
      color: var(--md-sys-color-on-surface);
      font-weight: 500;
      text-decoration: underline;
    }

    #preview-wrap {
      display: none;
      margin-bottom: 28px;
      position: relative;
    }
    #preview-img {
      max-width: 100%;
      max-height: 260px;
      border-radius: 16px;
      box-shadow: var(--md-elevation-1);
      object-fit: contain;
    }
    .remove-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: var(--md-sys-color-surface-variant);
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--md-sys-color-on-surface);
      box-shadow: var(--md-elevation-1);
      transition: background .2s, transform .2s;
    }
    .remove-btn:hover { 
      background: #ffb4ab;
      color: #690005;
    }
    .remove-btn:active { transform: scale(0.9); }

    .level-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 14px;
      text-align: left;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 32px;
    }

    .level-btn {
      position: relative;
      overflow: hidden;
      background: transparent;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 16px;
      padding: 12px 4px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: background .25s, color .25s, border-color .25s, box-shadow .25s;
      font-family: 'Google Sans', sans-serif;
      color: var(--md-sys-color-on-surface-variant);
    }
    .level-btn .lvl-num {
      font-size: 16px;
      font-weight: 500;
    }
    .level-btn .lvl-emoji {
      font-size: 20px;
      line-height: 1;
    }
    .level-btn:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--md-sys-color-on-surface);
    }
    html[data-theme="dark"] .level-btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .level-btn.selected {
      border-color: transparent;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary) !important;
      box-shadow: var(--md-elevation-2);
    }

    .md-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--md-sys-color-on-surface);
      font-family: 'Google Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: .01em;
      text-decoration: none;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 100px;
      padding: 0 28px;
      height: 48px;
      cursor: pointer;
      transition: background .25s, color .25s, border-color .25s, box-shadow .25s;
      min-width: 200px;
      justify-content: center;
    }
    .md-btn:hover:not(:disabled) {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border-color: transparent;
      box-shadow: var(--md-elevation-2);
    }
    .md-btn:disabled {
      opacity: .3;
      cursor: not-allowed;
      border-color: var(--md-sys-color-outline);
      color: var(--md-sys-color-on-surface-variant);
    }

    .ripple-circle {
      position: absolute;
      border-radius: 50%;
      background: var(--md-ripple-color);
      transform: scale(0);
      animation: ripple .4s cubic-bezier(0.1, 0.8, 0.3, 1);
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      color: var(--md-sys-color-on-surface);
      min-height: 20px;
      font-family: 'Google Sans Mono', monospace;
      font-weight: 500;
    }

    .progress-bar-wrap {
      display: none;
      width: 100%;
      height: 4px;
      background: var(--md-sys-color-surface-variant);
      border-radius: 100px;
      margin-top: 16px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      width: 0%;
      background: var(--md-sys-color-primary);
      border-radius: 100px;
      transition: width .2s ease;
    }

    #result-wrap {
      display: none;
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid var(--md-sys-color-surface-variant);
    }
    #result-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 16px;
    }
    #result-img {
      max-width: 100%;
      max-height: 320px;
      border-radius: 16px;
      box-shadow: var(--md-elevation-2);
      object-fit: contain;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    #result-caption {
      font-size: 15px;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 20px;
      font-style: italic;
    }

    footer {
      margin-top: 48px;
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.6;
      letter-spacing: .04em;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 8px;
      transition: opacity .2s ease, background .2s ease, transform .1s ease;
      user-select: none;
    }
    footer:hover {
      opacity: 0.9;
      background: rgba(0, 0, 0, 0.03);
    }
    html[data-theme="dark"] footer:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    footer:active { transform: scale(0.97); }
    .footer-fade {
      opacity: 0;
      transform: translateY(-4px);
    }

    @media (max-width: 600px) {
      body { padding: 80px 16px 32px; }
      .card { padding: 36px 24px; border-radius: 24px; }
      .divider { margin: 0 -24px 24px; }
      .headline { font-size: 22px; }
      .subheadline { font-size: 14px; margin-bottom: 24px; }
      .level-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .md-btn { width: 100%; height: 52px; }
    }
  </style>
</head>
<body>

  <div class="app-bar">
    <div class="app-bar-brand">
      <span class="material-icons" style="color: var(--md-sys-color-on-surface)">image_search</span>
      <span class="app-bar-title">shakal1zator — d6xd.github.io</span>
    </div>
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Сменить тему">
      <span class="material-icons">dark_mode</span>
    </button>
  </div>

  <div class="card" id="main-card">
    <h1 class="headline">v0dol4z shakal1zator</h1>
    <p class="subheadline">drop an image — and I'll bring it to the desired level of jpeg corruption.</p>

    <div class="divider"></div>

    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" />
      <span class="material-icons upload-icon">upload_file</span>
      <div class="upload-label">drop here or <span>choose file</span></div>
    </div>

    <div id="preview-wrap">
      <img id="preview-img" src="" alt="preview" />
      <button class="remove-btn" id="remove-btn" title="убрать">
        <span class="material-icons" style="font-size:18px">close</span>
      </button>
    </div>

    <div class="level-label">jpeg corruption lvl</div>
    <div class="level-grid">
      <button class="level-btn" data-level="5"><span class="lvl-num">1</span><span class="lvl-emoji">😶</span></button>
      <button class="level-btn" data-level="6"><span class="lvl-num">2</span><span class="lvl-emoji">🙃</span></button>
      <button class="level-btn" data-level="7"><span class="lvl-num">3</span><span class="lvl-emoji">🗑️</span></button>
      <button class="level-btn" data-level="8"><span class="lvl-num">4</span><span class="lvl-emoji">💀</span></button>
      <button class="level-btn" data-level="9"><span class="lvl-num">5</span><span class="lvl-emoji">🧟</span></button>
      <button class="level-btn" data-level="10"><span class="lvl-num">6</span><span class="lvl-emoji">👹</span></button>
    </div>

    <button class="md-btn" id="shakal-btn" disabled>
      <span class="material-icons" style="font-size:18px">auto_fix_high</span>
      jpeg corruption
    </button>

    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar-inner" id="progress-bar"></div>
    </div>

    <div id="status"></div>

    <div id="result-wrap">
      <div id="result-label">result</div>
      <img id="result-img" src="" alt="result" />
      <div id="result-caption"></div>
      <a class="md-btn" id="download-btn" download="shakal.jpg">
        <span class="material-icons" style="font-size:18px">download</span>
        download!!!
      </a>
    </div>
  </div>

  <footer id="footer-text" onclick="changeFooterText()" title="Кликни, чтобы изменить фразу">nepetapip3 · github.io</footer>

  <script>
    let selectedLevel = null;
    let imageFile     = null;

    const captions = {
        5:  "lvl 1: fine",
        6:  "lvl 2: it's already worse",
        7:  "lvl 3: nah uh",
        8:  "lvl 4: horrible",
        9:  "lvl 5: are we deadass",
        10: "lvl 6: ok, im out",
    };

    const levelParams = {
      5:  { quality: 0.30, scale: 0.65, passes: 3 },
      6:  { quality: 0.20, scale: 0.55, passes: 3 },
      7:  { quality: 0.12, scale: 0.45, passes: 4 },
      8:  { quality: 0.06, scale: 0.35, passes: 5 },
      9:  { quality: 0.03, scale: 0.25, passes: 6 },
      10: { quality: 0.01, scale: 0.15, passes: 8 },
    };

    const fileInput   = document.getElementById('file-input');
    const uploadZone  = document.getElementById('upload-zone');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg  = document.getElementById('preview-img');
    const removeBtn   = document.getElementById('remove-btn');
    const shakalBtn   = document.getElementById('shakal-btn');
    const statusEl    = document.getElementById('status');
    const resultWrap  = document.getElementById('result-wrap');
    const resultImg   = document.getElementById('result-img');
    const resultCaption = document.getElementById('result-caption');
    const downloadBtn = document.getElementById('download-btn');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar  = document.getElementById('progress-bar');

    // Плавный выезд карточки при загрузке
    document.addEventListener("DOMContentLoaded", () => {
      requestAnimationFrame(() => {
        document.getElementById("main-card").classList.add("visible");
      });
    });

    function updateBtn() {
      shakalBtn.disabled = !(imageFile && selectedLevel);
    }

    function setProgress(pct) {
      progressBar.style.width = pct + '%';
    }

    function loadFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      imageFile = file;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      uploadZone.style.display = 'none';
      previewWrap.style.display = 'block';
      resultWrap.style.display = 'none';
      statusEl.textContent = '';
      updateBtn();
    }

    fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

    uploadZone.addEventListener('dragover', e => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      loadFile(e.dataTransfer.files[0]);
    });

    removeBtn.addEventListener('click', () => {
      imageFile = null;
      previewImg.src = '';
      fileInput.value = '';
      previewWrap.style.display = 'none';
      uploadZone.style.display = 'block';
      resultWrap.style.display = 'none';
      statusEl.textContent = '';
      updateBtn();
    });

    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        selectedLevel = parseInt(this.dataset.level);
        updateBtn();
        rippleEffect(this, e);
      });
    });

    shakalBtn.addEventListener('click', function(e) {
      rippleEffect(this, e);
      shakalize();
    });

    async function shakalize() {
      const { quality, scale, passes } = levelParams[selectedLevel];

      shakalBtn.disabled = true;
      progressWrap.style.display = 'block';
      setProgress(0);
      resultWrap.style.display = 'none';

      const bitmap = await createImageBitmap(imageFile);
      const origW = bitmap.width;
      const origH = bitmap.height;

      const offscreen = new OffscreenCanvas(origW, origH);
      const ctx = offscreen.getContext('2d');
      ctx.drawImage(bitmap, 0, 0);

      let currentW = origW;
      let currentH = origH;

      for (let pass = 0; pass < passes; pass++) {
        statusEl.textContent = `pls wait... ${pass + 1}/${passes}`;

        const newW = Math.max(16, Math.round(origW * scale));
        const newH = Math.max(16, Math.round(origH * scale));

        const smallCanvas = new OffscreenCanvas(newW, newH);
        const smallCtx = smallCanvas.getContext('2d');
        smallCtx.drawImage(offscreen, 0, 0, currentW, currentH, 0, 0, newW, newH);

        const blob = await smallCanvas.convertToBlob({ type: 'image/jpeg', quality });
        const newBitmap = await createImageBitmap(blob);

        if (pass < passes - 1) {
          offscreen.width = origW;
          offscreen.height = origH;
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(newBitmap, 0, 0, origW, origH);
          currentW = origW;
          currentH = origH;
        } else {
          offscreen.width = newW;
          offscreen.height = newH;
          const lastCtx = offscreen.getContext('2d');
          lastCtx.drawImage(newBitmap, 0, 0);
          currentW = newW;
          currentH = newH;
        }

        setProgress(Math.round(((pass + 1) / passes) * 100));
        await new Promise(r => setTimeout(r, 30));
      }

      const finalBlob = await offscreen.convertToBlob({ type: 'image/jpeg', quality });
      const finalUrl  = URL.createObjectURL(finalBlob);

      resultImg.src = finalUrl;
      downloadBtn.href = finalUrl;
      downloadBtn.download = `shakal_level_${selectedLevel}.jpg`;
      resultCaption.textContent = captions[selectedLevel];
      resultWrap.style.display = 'block';

      statusEl.textContent = 'done!';
      shakalBtn.disabled = false;

      resultWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function rippleEffect(btn, e) {
      const circle = document.createElement('span');
      const rect   = btn.getBoundingClientRect();
      const size   = Math.max(rect.width, rect.height);
      
      circle.className = 'ripple-circle';
      circle.style.width = circle.style.height = `${size}px`;
      circle.style.left = `${e.clientX - rect.left - size/2}px`;
      circle.style.top = `${e.clientY - rect.top - size/2}px`;
      
      btn.appendChild(circle);
      circle.addEventListener('animationend', () => circle.remove());
    }

    document.querySelectorAll('.md-btn, .icon-btn').forEach(btn => {
      btn.addEventListener('click', function(e) { rippleEffect(this, e); });
    });

    const footerVariants = [
      "d6xd.lol?",
      "nepetacsv? who is this?",
      "d6xd",
      "sudo rm -rf --no-preserve-root /*",
      "404 not found",
      "what is nekobrawl?",
      "i use cachyos btw :3",
      "does anyone actually read this?",
      "lol",
      "whoami",
      "jpeg artifacts are beautiful",
    ];
    
    const footerEl = document.getElementById('footer-text');
    footerEl.textContent = footerVariants[Math.floor(Math.random() * footerVariants.length)];

    function changeFooterText() {
      footerEl.style.transition = 'opacity 0.15s ease, transform 0.15s ease';
      footerEl.classList.add('footer-fade');
      
      setTimeout(() => {
        let currentText = footerEl.textContent;
        let newText = currentText;
        while (newText === currentText) {
          newText = footerVariants[Math.floor(Math.random() * footerVariants.length)];
        }
        footerEl.textContent = newText;
        footerEl.classList.remove('footer-fade');
      }, 150);
    }

    function toggleTheme() {
      const html = document.documentElement;
      const themeBtnIcon = document.querySelector('#theme-btn .material-icons');
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      html.setAttribute('data-theme', newTheme);
      themeBtnIcon.textContent = newTheme === 'dark' ? 'dark_mode' : 'light_mode';
      localStorage.setItem('theme', newTheme);
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.querySelector('#theme-btn .material-icons').textContent = savedTheme === 'dark' ? 'dark_mode' : 'light_mode';
  </script>
</body>
</html>
